apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: ${{ values.name }}-build-
  namespace: ${{ values.namespace }}
  labels:
    app.kubernetes.io/instance: ${{ values.name }}
    backstage.io/kubernetes-id: ${{ values.name }}
    janus-idp.io/tekton: ${{ values.name }}
    tekton.dev/pipeline: ${{ values.name }}-build
spec:
  pipelineRef:
    name: ${{ values.name }}-build
  workspaces:
    - name: source
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 1Gi
    - name: dockerconfig
      secret:
        secretName: quay-push-secret
