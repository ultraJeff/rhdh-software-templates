apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: ${{ values.name }}-build
  namespace: ${{ values.namespace }}
  labels:
    app.kubernetes.io/instance: ${{ values.name }}
    backstage.io/kubernetes-id: ${{ values.name }}
spec:
  params:
    - name: git-url
      type: string
      default: https://${{ values.ghHost }}/${{ values.ghOwner }}/${{ values.repoName }}.git
    - name: git-revision
      type: string
      default: main
    - name: image
      type: string
      default: ${{ values.image }}:latest
  workspaces:
    - name: source
  tasks:
    - name: clone
      taskRef:
        name: git-clone
      params:
        - name: URL
          value: $(params.git-url)
        - name: REVISION
          value: $(params.git-revision)
      workspaces:
        - name: output
          workspace: source

    - name: build-app
      runAfter: [clone]
      taskSpec:
        workspaces:
          - name: source
        steps:
          - name: npm-install
            image: registry.access.redhat.com/ubi9/nodejs-22:latest
            workingDir: $(workspaces.source.path)
            script: |
              npm install
              npm run build
      workspaces:
        - name: source
          workspace: source

    - name: build-image
      runAfter: [build-app]
      taskRef:
        name: buildah
      params:
        - name: IMAGE
          value: $(params.image)
      workspaces:
        - name: source
          workspace: source
